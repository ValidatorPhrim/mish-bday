<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#B04D6A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7A1F3D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="90%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#C4933A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7A1F3D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#7A1F3D"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Top ornament -->
  <g opacity="0.2" transform="translate(600,60)">
    <path d="M-120 0 Q-60 -20 0 0 Q60 20 120 0" stroke="#FFF5EE" stroke-width="1.5" fill="none"/>
    <path d="M-80 0 Q-40 -12 0 0 Q40 12 80 0" stroke="#FFF5EE" stroke-width="0.8" fill="none"/>
    <circle cx="0" cy="0" r="4" fill="#E8C47A" opacity="0.9"/>
  </g>

  <!-- Eyebrow -->
  <text x="600" y="190" font-family="Georgia, serif" font-size="22" font-weight="600"
        fill="rgba(255,240,230,0.6)" text-anchor="middle" letter-spacing="8">A BIRTHDAY WEEKEND</text>

  <!-- Name -->
  <text x="600" y="360" font-family="Georgia, serif" font-style="italic" font-size="200"
        fill="#FFF5EE" text-anchor="middle" letter-spacing="-4">Mish</text>

  <!-- Tagline -->
  <text x="600" y="430" font-family="Georgia, serif" font-style="italic" font-size="28"
        fill="rgba(255,240,230,0.65)" text-anchor="middle">Staycation</text>

  <!-- Date line -->
  <line x1="480" y1="475" x2="560" y2="475" stroke="rgba(255,240,230,0.25)" stroke-width="1"/>
  <rect x="596" y="471" width="8" height="8" fill="#C4933A" transform="rotate(45,600,475)" opacity="0.8"/>
  <line x1="640" y1="475" x2="720" y2="475" stroke="rgba(255,240,230,0.25)" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="600" y="530" font-family="Georgia, serif" font-size="18"
        fill="rgba(255,240,230,0.35)" text-anchor="middle" letter-spacing="5">FRIDAY · SATURDAY · SUNDAY</text>
</svg>
